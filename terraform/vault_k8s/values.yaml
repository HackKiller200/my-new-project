global:
  enabled: true
  tlsDisable: true
server:
  replicas: 1
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = true
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
      api_addr = "http://vault.vault.svc.cluster.local:8200"
      cluster_addr = "https://vault-0.vault-internal:8201"
      disable_mlock = true
  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: "local-path"
    accessMode: ReadWriteOnce
    mountPath: "/vault/data"
  service:
    enabled: true
    type: ClusterIP
    ports:
      - name: http
        port: 8200
        targetPort: 8200
      - name: internal
        port: 8201
        targetPort: 8201
injector:
  enabled: true
  replicas: 1
  image:
    repository: "hashicorp/vault-k8s"
    tag: "1.3.1"
    pullPolicy: IfNotPresent
  agent:
    image:
      repository: "hashicorp/vault"
      tag: "1.15.2"
  webhook:
    failurePolicy: Ignore
    matchPolicy: Exact
    namespaceSelector:
      matchLabels:
        vault-injection: enabled
  logLevel: "info"
  serviceAccount:
    create: true
    name: "vault-injector"
ui:
  enabled: true
  serviceType: "ClusterIP"
  serviceNodePort: null
  externalPort: 8200
